basePath: /api/v1
definitions:
  base.ChatGPT:
    properties:
      frequencyPenalty:
        example: 0
        type: number
      keyCode:
        type: string
      maxTokens:
        description: 返回文本长度
        example: 150
        type: integer
      model:
        example: text-davinci-003
        type: string
      presencePenalty:
        example: 0.6
        type: number
      prompt:
        example: 介绍一下自己
        type: string
      suffix:
        description: 返回文本后缀
        example: 小夏
        type: string
      temperature:
        description: 随机性程度
        example: 0.9
        type: number
      topP:
        example: 1
        type: number
    type: object
  base.ChatGPTApi:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/base.ChatGptApiData'
    type: object
  base.ChatGptApiData:
    properties:
      id:
        type: string
      key:
        type: string
      message:
        type: string
      text:
        type: string
    type: object
  base.FileInfo:
    properties:
      filename:
        type: string
      url:
        type: string
    type: object
  base.Third:
    type: object
  base.User:
    properties:
      avatar:
        description: 用户头像
        example: https://******.com/aa.png
        type: string
      createdAt:
        description: 创建时间
        type: string
      email:
        description: 邮箱
        example: 123456789@qq.com
        type: string
      gender:
        description: 性别
        type: integer
      id:
        description: 自增id
        type: integer
      intro:
        description: 个人介绍
        example: 个人介绍
        type: string
      isAdmin:
        default: false
        description: 是否管理员
        type: boolean
      isLock:
        default: false
        description: 是否已锁
        type: boolean
      nickName:
        description: 用户昵称
        example: 酱
        type: string
      updatedAt:
        description: 更新时间
        type: string
      userId:
        description: 用户唯一id
        type: string
      userName:
        description: 用户名
        example: test
        maxLength: 12
        minLength: 4
        type: string
    required:
    - userName
    type: object
  model.AddFriend:
    properties:
      friendId:
        type: string
      groupId:
        type: integer
      lastReadTime:
        type: string
      userId:
        type: string
    type: object
  model.AddMoment:
    properties:
      content:
        type: string
      location:
        type: string
      urls:
        type: string
      userId:
        type: string
    type: object
  model.AdminMessageOperateReq:
    properties:
      id:
        description: 消息主键id
        type: integer
    required:
    - id
    type: object
  model.AdminTransferGroupOwnerReq:
    properties:
      targetUserId:
        description: 目标新群主 userId
        type: string
    required:
    - targetUserId
    type: object
  model.AdminUserRestrictReq:
    properties:
      isLock:
        description: true=封禁 false=解封
        type: boolean
      reason:
        description: 封禁原因（可选）
        type: string
    type: object
  model.ChangePassword:
    properties:
      newPassword:
        example: "123456"
        maxLength: 16
        minLength: 6
        type: string
      password:
        example: "123456"
        maxLength: 16
        minLength: 6
        type: string
      userName:
        example: test
        maxLength: 12
        minLength: 4
        type: string
    required:
    - newPassword
    - password
    - userName
    type: object
  model.ChatGroup:
    properties:
      avatar:
        type: string
      createdAt:
        description: 创建时间
        type: string
      groupName:
        type: string
      id:
        description: 自增id
        type: integer
      intro:
        type: string
      notice:
        type: string
      updatedAt:
        description: 更新时间
        type: string
      userId:
        type: string
    type: object
  model.ChatGroupMember:
    properties:
      createdAt:
        description: 创建时间
        type: string
      groupId:
        type: integer
      id:
        description: 自增id
        type: integer
      updatedAt:
        description: 更新时间
        type: string
      userId:
        type: string
      userInfo:
        $ref: '#/definitions/model.User'
    type: object
  model.ChatLog:
    properties:
      content:
        type: string
      createdAt:
        description: 创建时间
        type: string
      groupId:
        type: integer
      id:
        description: 自增id
        type: integer
      isDeleted:
        type: boolean
      isRevoked:
        type: boolean
      logType:
        type: integer
      msgType:
        type: integer
      operateBy:
        description: 记录管理端处置操作者，便于后续审计追溯
        type: string
      receiverId:
        type: string
      senderId:
        type: string
      updatedAt:
        description: 更新时间
        type: string
      userInfo:
        $ref: '#/definitions/model.User'
    type: object
  model.ChatLogQuery:
    properties:
      content:
        example: ""
        type: string
      groupId:
        type: integer
      page:
        example: 1
        type: integer
      pageSize:
        example: 20
        type: integer
      receiverId:
        type: string
      senderId:
        type: string
    type: object
  model.LoginForm:
    properties:
      password:
        example: "123456"
        maxLength: 16
        minLength: 6
        type: string
      userName:
        example: test
        maxLength: 12
        minLength: 4
        type: string
    required:
    - password
    - userName
    type: object
  model.RegisterForm:
    properties:
      avatar:
        description: 用户头像
        example: https://******.com/aa.png
        type: string
      email:
        description: 邮箱
        example: 123456789@qq.com
        type: string
      gender:
        description: 性别
        type: integer
      intro:
        description: 个人介绍
        example: 个人介绍
        type: string
      nickName:
        description: 用户昵称
        example: 酱
        type: string
      password:
        example: "123456"
        maxLength: 16
        minLength: 6
        type: string
      userName:
        example: test
        maxLength: 12
        minLength: 4
        type: string
    required:
    - password
    - userName
    type: object
  model.SensitiveWordCreateReq:
    properties:
      level:
        type: integer
      remark:
        type: string
      status:
        type: integer
      word:
        type: string
    required:
    - word
    type: object
  model.SensitiveWordUpdateReq:
    properties:
      level:
        type: integer
      remark:
        type: string
      status:
        type: integer
      word:
        type: string
    type: object
  model.SysConfigCreateReq:
    properties:
      configKey:
        type: string
      configValue:
        type: string
      remark:
        type: string
    required:
    - configKey
    type: object
  model.SysConfigEditReq:
    properties:
      configValue:
        type: string
      remark:
        type: string
    type: object
  model.UpdateChatGroup:
    properties:
      avatar:
        description: 群头像（可选）
        type: string
      groupName:
        description: 群名称（可选）
        type: string
      intro:
        description: 群介绍（可选）
        type: string
      notice:
        description: 群公告（可选）
        type: string
    type: object
  model.UpdateReadTime:
    properties:
      groupId:
        type: integer
      receiverId:
        type: string
      senderId:
        type: string
    type: object
  model.UpdateUser:
    properties:
      avatar:
        description: 用户头像
        example: https://******.com/aa.png
        type: string
      email:
        description: 邮箱
        example: 123456789@qq.com
        type: string
      gender:
        description: 性别
        type: integer
      intro:
        description: 个人介绍
        example: 个人介绍
        type: string
      nickName:
        description: 用户昵称
        example: 酱
        type: string
    type: object
  model.User:
    properties:
      avatar:
        description: 用户头像
        example: https://******.com/aa.png
        type: string
      createdAt:
        description: 创建时间
        type: string
      email:
        description: 邮箱
        example: 123456789@qq.com
        type: string
      gender:
        description: 性别
        type: integer
      id:
        description: 自增id
        type: integer
      intro:
        description: 个人介绍
        example: 个人介绍
        type: string
      isAdmin:
        default: false
        description: 是否管理员
        type: boolean
      isLock:
        default: false
        description: 是否已锁
        type: boolean
      nickName:
        description: 用户昵称
        example: 酱
        type: string
      updatedAt:
        description: 更新时间
        type: string
      userId:
        description: 用户唯一id
        type: string
      userName:
        description: 用户名
        example: test
        maxLength: 12
        minLength: 4
        type: string
    required:
    - userName
    type: object
  response.ResType:
    properties:
      code:
        default: 0
        type: integer
      data: {}
      encrypt:
        type: string
      msg:
        default: 操作成功
        type: string
    type: object
host: localhost:9600
info:
  contact: {}
  description: zone服务端API服务
  title: Gin-Zone-Api
  version: "1.0"
paths:
  /admin/auditLogs:
    get:
      consumes:
      - application/json
      description: 管理端-审计日志查询
      parameters:
      - in: query
        name: action
        type: string
      - description: 结束时间（yyyy-MM-dd HH:mm:ss）
        in: query
        name: endAt
        type: string
      - in: query
        name: operatorUserId
        type: string
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      - description: 起始时间（yyyy-MM-dd HH:mm:ss）
        in: query
        name: startAt
        type: string
      - in: query
        name: targetType
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-审计日志
      tags:
      - 管理端-系统模块
  /admin/chat/friends:
    get:
      consumes:
      - application/json
      description: 管理端-好友/群聊关系列表
      parameters:
      - in: query
        name: friendId
        type: string
      - in: query
        name: groupId
        type: integer
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      - in: query
        name: userId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-好友/群聊关系列表
      tags:
      - 管理端-聊天模块
  /admin/chat/friends/{id}:
    delete:
      consumes:
      - application/json
      description: 管理端-按关系主键删除（z_chat_friends.id）
      parameters:
      - description: 关系id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-删除好友/群聊关系
      tags:
      - 管理端-聊天模块
  /admin/chat/groupMembers/{groupId}/{userId}:
    delete:
      consumes:
      - application/json
      description: 管理端-删除群成员（管理员）
      parameters:
      - description: 群组id
        in: path
        name: groupId
        required: true
        type: integer
      - description: 成员用户id
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-删除群成员
      tags:
      - 管理端-聊天模块
  /admin/chat/groups:
    get:
      consumes:
      - application/json
      description: 管理端-群组列表（支持 groupName 模糊查询）
      parameters:
      - in: query
        name: groupName
        type: string
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-群组列表
      tags:
      - 管理端-聊天模块
  /admin/chat/groups/{groupId}:
    patch:
      consumes:
      - application/json
      description: 管理端-修改群聊信息（管理员）
      parameters:
      - description: 群组id
        in: path
        name: groupId
        required: true
        type: integer
      - description: 需要上传的json
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.UpdateChatGroup'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-修改群聊信息
      tags:
      - 管理端-聊天模块
  /admin/chat/groups/{id}:
    delete:
      consumes:
      - application/json
      description: 管理端-解散群组（群主或管理员）
      parameters:
      - description: 群组id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-解散群组
      tags:
      - 管理端-聊天模块
    get:
      consumes:
      - application/json
      description: 管理端-查询群组详情（含群主信息）
      parameters:
      - description: 群组id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-群组详情
      tags:
      - 管理端-聊天模块
  /admin/chat/groups/{id}/transferOwner:
    post:
      consumes:
      - application/json
      description: 管理端-转移群主（群主或管理员）
      parameters:
      - description: 群组id
        in: path
        name: id
        required: true
        type: integer
      - description: 转移参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.AdminTransferGroupOwnerReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-转移群主
      tags:
      - 管理端-聊天模块
  /admin/chat/messages:
    get:
      consumes:
      - application/json
      description: 管理端-按发送人/群组/关键词/时间范围/类型检索消息
      parameters:
      - description: 结束时间（yyyy-MM-dd HH:mm:ss）
        in: query
        name: endAt
        type: string
      - in: query
        name: groupId
        type: integer
      - in: query
        name: keyword
        type: string
      - in: query
        name: msgType
        type: integer
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      - in: query
        name: senderId
        type: string
      - description: 起始时间（yyyy-MM-dd HH:mm:ss）
        in: query
        name: startAt
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-消息检索
      tags:
      - 管理端-聊天模块
  /admin/chat/messages/delete:
    post:
      consumes:
      - application/json
      description: 管理端-软删除消息
      parameters:
      - description: 处置参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.AdminMessageOperateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-删除消息
      tags:
      - 管理端-聊天模块
  /admin/chat/messages/revoke:
    post:
      consumes:
      - application/json
      description: 管理端-软撤回消息
      parameters:
      - description: 处置参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.AdminMessageOperateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-撤回消息
      tags:
      - 管理端-聊天模块
  /admin/sensitiveWords:
    get:
      consumes:
      - application/json
      parameters:
      - description: -1全部 1低 2中 3高
        in: query
        name: level
        type: integer
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      - description: -1全部 0禁用 1启用
        in: query
        name: status
        type: integer
      - in: query
        name: word
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-敏感词列表
      tags:
      - 管理端-敏感词
    post:
      consumes:
      - application/json
      parameters:
      - description: 参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.SensitiveWordCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-新增敏感词
      tags:
      - 管理端-敏感词
  /admin/sensitiveWords/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: 敏感词id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-删除敏感词
      tags:
      - 管理端-敏感词
    patch:
      consumes:
      - application/json
      parameters:
      - description: 敏感词id
        in: path
        name: id
        required: true
        type: integer
      - description: 参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.SensitiveWordUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-编辑敏感词
      tags:
      - 管理端-敏感词
  /admin/sensitiveWords/hits:
    get:
      consumes:
      - application/json
      parameters:
      - in: query
        name: groupId
        type: integer
      - example: 1
        in: query
        name: page
        type: integer
      - example: 20
        in: query
        name: pageSize
        type: integer
      - in: query
        name: senderId
        type: string
      - in: query
        name: word
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-敏感词命中记录
      tags:
      - 管理端-敏感词
  /admin/sysConfig:
    get:
      consumes:
      - application/json
      description: 管理端-系统配置查询
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-系统配置查询
      tags:
      - 管理端-系统模块
    post:
      consumes:
      - application/json
      description: 管理端-系统配置新增
      parameters:
      - description: 配置参数
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.SysConfigCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-系统配置新增
      tags:
      - 管理端-系统模块
  /admin/sysConfig/{id}:
    delete:
      consumes:
      - application/json
      description: 管理端-系统配置删除
      parameters:
      - description: 配置id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResType'
      security:
      - Authorization: []
      summary: 管理端-系统配置删除
      tags:
      - 管理端-系统模块
    patch:
      consumes:
      - application/json
      description: 管理端-系统配置编辑
      parameters:
      - description: 配置id
        in: path
        name: id
        required: true
        type: integer
      - description: 配置参数
        in: body
        name: payload
