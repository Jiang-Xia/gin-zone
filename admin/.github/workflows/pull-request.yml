name: admin pull request checks

on:
  pull_request:
    paths:
      - 'admin/**'

jobs:
  verify-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
